# Deploy the overview story to GitHub Pages. The Mapbox public token is kept
# OUT of the repository: it lives in the MAPBOX_TOKEN Actions secret and is
# written into token.js only inside the published artifact.
name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Inject Mapbox token
        run: echo "window.MAPBOX_TOKEN='${{ secrets.MAPBOX_TOKEN }}';" > token.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
